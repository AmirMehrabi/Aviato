[program:aviato-horizon]
process_name=%(program_name)s
command=/usr/bin/php /var/www/html/aviato/current/artisan horizon
directory=/var/www/html/aviato/current
user=aviato
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stopwaitsecs=3600
redirect_stderr=true
stdout_logfile=/var/log/supervisor/aviato-horizon.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
