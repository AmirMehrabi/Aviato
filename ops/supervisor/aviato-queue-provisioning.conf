[program:aviato-queue-provisioning]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/html/aviato/current/artisan queue:work redis --queue=provisioning --sleep=3 --tries=3 --timeout=600 --max-time=3600 --memory=256 --force
directory=/var/www/html/aviato/current
user=aviato
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stopwaitsecs=630
redirect_stderr=true
stdout_logfile=/var/log/supervisor/aviato-queue-provisioning.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=10
